<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base href="/evento/">
    <title>Evento - CR</title>
    <meta name="description" content="Ofertas especiais de Clash Royale. Garanta seus prêmios agora!">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <!-- Prefetch da loja principal para transição instantânea -->
    <link rel="prefetch" href="/">
    <link rel="prefetch" href="/index.html">
    <link rel="preload" href="/evento/fonts/clash-regular.24a357c6.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/evento/fonts/clash-bold.woff2" as="font" type="font/woff2" crossorigin>
<!-- Microsoft Clarity -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wahzbczx2t");
</script>
<style>
    @font-face {
        font-family: 'Clash';
        src: url('fonts/clash-regular.24a357c6.woff2') format('woff2');
        font-weight: normal; font-style: normal; font-display: block;
    }
    @font-face {
        font-family: 'Clash-Bold';
        src: url('fonts/clash-bold.woff2') format('woff2');
        font-weight: bold; font-style: normal; font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Clash', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #000;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        display: flex; flex-direction: column;
    }

    .header {
        background: #0f377d;
        padding: 12px 20px;
        text-align: center;
    }
    .header img {
        height: 72px; width: auto;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }

    .site-footer {
        background: #000;
        padding: 24px 20px;
        text-align: center;
    }
    .site-footer img {
        height: 36px; width: auto; opacity: 0.7;
    }

    .content {
        max-width: 480px;
        margin: 0 auto;
        padding: 30px 20px 40px;
        text-align: center;
        flex: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
    }

    .online-counter {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: rgba(74, 159, 245, 0.08);
        border-radius: 50px;
        margin-bottom: 24px;
        animation: fadeIn 0.6s ease-out;
    }
    .online-dot {
        width: 10px; height: 10px;
        background: #4a9ff5;
        border-radius: 50%;
        animation: blink 1.5s ease-in-out infinite;
        box-shadow: 0 0 8px rgba(74, 159, 245, 0.6);
    }
    .online-text { font-size: 0.95em; color: #2d3748; font-weight: 600; }
    .online-number { color: #4a9ff5; font-weight: 700; }

    .queue-message { text-align: center; animation: fadeIn 0.6s ease-out; }
    .queue-text {
        font-size: 2.2em;
        font-family: 'Clash-Bold', 'Clash', sans-serif;
        color: #2d3748; font-weight: bold;
        margin-bottom: 10px; line-height: 1.3;
    }
    .queue-subtext {
        font-size: 1.1em; color: #718096;
        margin-bottom: 30px; line-height: 1.4;
    }

    .countdown-circle {
        position: relative;
        width: 180px; height: 180px;
        margin: 0 auto 30px;
    }
    .countdown-circle svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .countdown-circle .circle-bg { fill: none; stroke: rgba(161, 189, 217, 0.3); stroke-width: 8; }
    .countdown-circle .circle-progress {
        fill: none; stroke: #4a9ff5; stroke-width: 8;
        stroke-linecap: round; transition: stroke-dashoffset 1s linear;
    }
    .queue-counter {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 4em; font-family: 'Clash-Bold', 'Clash', sans-serif;
        color: #2d3748; font-weight: bold;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .success-message { text-align: center; margin: 0 0 20px; }
    .success-message .success-title {
        font-size: 2.3em; font-family: 'Clash-Bold', 'Clash', sans-serif;
        color: #2d3748; font-weight: bold; line-height: 1.3;
    }

    .cta-button {
        display: inline-block;
        background: linear-gradient(135deg, #4a9ff5 0%, #1e7ce0 100%);
        color: white; font-family: 'Clash-Bold', 'Clash', sans-serif;
        font-size: 1.3em; padding: 18px 60px;
        border-radius: 50px; text-decoration: none;
        border: none; cursor: pointer;
        box-shadow: 0 10px 30px rgba(74, 159, 245, 0.4);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        animation: pulse 2s ease-in-out infinite;
        transition: all 0.3s ease;
    }
    .cta-button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(74, 159, 245, 0.6); }
    .cta-button:active { transform: translateY(-1px); }

    .security-badge {
        display: flex; align-items: center; justify-content: center;
        gap: 8px; margin-top: 20px; color: #a0aec0; font-size: 0.9em;
        animation: fadeIn 1s ease-out backwards; animation-delay: 1s;
    }
    .security-icon { width: 20px; height: 20px; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{box-shadow:0 10px 30px rgba(74,159,245,.4),0 0 0 0 rgba(30,124,224,.5)} 50%{box-shadow:0 10px 30px rgba(74,159,245,.4),0 0 0 15px rgba(30,124,224,0)} }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.9)} }

    @media (max-width: 480px) {
        .header { padding: 10px 16px; }
        .header img { height: 62px; }
        .content { padding: 24px 16px 30px; }
        .online-counter { padding: 8px 16px; font-size: 0.88em; margin-bottom: 20px; }
        .queue-text { font-size: 1.8em; margin-bottom: 8px; }
        .queue-subtext { font-size: 1em; margin-bottom: 24px; }
        .countdown-circle { width: 150px; height: 150px; margin-bottom: 24px; }
        .queue-counter { font-size: 3.2em; }
        .success-message .success-title { font-size: 1.9em; }
        .cta-button { font-size: 1.1em; padding: 16px 50px; width: 100%; max-width: 100%; }
        .security-badge { font-size: 0.82em; margin-top: 16px; }
    }
    @media (max-width: 360px) {
        .header img { height: 54px; }
        .content { padding: 20px 12px 24px; }
        .online-counter { padding: 7px 14px; font-size: 0.82em; }
        .queue-text { font-size: 1.5em; }
        .queue-subtext { font-size: 0.92em; }
        .countdown-circle { width: 130px; height: 130px; margin-bottom: 20px; }
        .queue-counter { font-size: 2.8em; }
        .success-message .success-title { font-size: 1.6em; }
        .cta-button { font-size: 1em; padding: 14px 40px; }
    }
</style>
</head>
<body>

<div style="background:#fff;flex:1;display:flex;flex-direction:column">
<div class="header">
    <img src="images/logo-clashroyale.webp" alt="Clash Royale">
</div>

<div class="content">
    <div class="online-counter">
        <div class="online-dot"></div>
        <span class="online-text">
            <span class="online-number" id="onlineCountTop">847</span> jogadores acessando o evento agora
        </span>
    </div>

    <div id="queueMessage" class="queue-message">
        <p class="queue-text">Você está quase lá!</p>
        <p class="queue-subtext">Verificando seu lugar na fila...</p>
        <div class="countdown-circle" id="countdownCircle">
            <svg viewBox="0 0 180 180">
                <circle class="circle-bg" cx="90" cy="90" r="82"></circle>
                <circle class="circle-progress" id="circleProgress" cx="90" cy="90" r="82"></circle>
            </svg>
            <div class="queue-counter" id="queueCounter">5</div>
        </div>
    </div>

    <div id="successContent" style="display: none; text-align: center;">
        <div class="success-message">
            <p class="success-title">Parabéns!<br>Sua vez chegou!</p>
        </div>
    </div>

    <div class="security-badge">
        <svg class="security-icon" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span>Conexão Segura e Protegida</span>
    </div>
</div>

</div><!-- /wrapper branco -->

<div class="site-footer">
    <img src="images/supercell-logo-white.svg" alt="Supercell">
</div>

<script>
const DOMINIO_OFERTA = '../';

let counter = 5;
const queueMessage = document.getElementById('queueMessage');
const successContent = document.getElementById('successContent');
const queueCounter = document.getElementById('queueCounter');
const circleProgress = document.getElementById('circleProgress');

const radius = 82;
const circumference = 2 * Math.PI * radius;
circleProgress.style.strokeDasharray = circumference;
circleProgress.style.strokeDashoffset = 0;

setTimeout(() => { startQueueCountdown(); }, 1000);

function startQueueCountdown() {
    const countdownInterval = setInterval(() => {
        counter--;
        queueCounter.textContent = counter;
        const progress = counter / 5;
        const offset = circumference * (1 - progress);
        circleProgress.style.strokeDashoffset = offset;
        if (counter === 0) {
            clearInterval(countdownInterval);
            setTimeout(() => {
                queueMessage.style.animation = 'fadeOut 0.5s ease-out forwards';
                setTimeout(() => {
                    queueMessage.style.display = 'none';
                    successContent.style.display = 'block';
                    successContent.style.animation = 'fadeIn 0.6s ease-out forwards';
                    // Auto-redirect 1.5s após "Parabéns!" aparecer
                    setTimeout(continuar, 1500);
                }, 500);
            }, 500);
        }
    }, 1000);
}

const onlineCountTop = document.getElementById('onlineCountTop');
let baseCount = Math.floor(Math.random() * (920 - 820) + 820);
onlineCountTop.textContent = baseCount.toLocaleString('pt-BR');

setInterval(() => {
    const change = Math.floor(Math.random() * 12) - 3;
    baseCount += change;
    if (baseCount < 800) baseCount = 800;
    if (baseCount > 950) baseCount = 950;
    onlineCountTop.textContent = baseCount.toLocaleString('pt-BR');
}, 5000);

function continuar() {
    window.location.href = DOMINIO_OFERTA;
}

const style = document.createElement('style');
style.textContent = '@keyframes fadeOut{from{opacity:1}to{opacity:0}}';
document.head.appendChild(style);

history.pushState(null, null, location.href);
window.onpopstate = function () { history.go(1); };
</script>
<script>
// ============================================
// TRACKING — Saídas suspeitas + anti-clone
// ============================================
(function(){
  var pageLoadAt = Date.now();
  var interagiu = false;
  var enviouSaida = false;
  var anticloneDetectado = false;
  function track(name){ if(window.clarity) window.clarity('event', name); }

  // Primeira interação
  function marcarInteracao(){ if(!interagiu) interagiu = true; }
  ['click','touchstart','scroll','keydown','focus'].forEach(function(ev){
    window.addEventListener(ev, marcarInteracao, { passive: true, capture: true });
  });

  // Intercepta runAnalytics (anti-clone que redireciona pro Google)
  function tentarInterceptar(){
    if (window.runAnalytics && typeof window.runAnalytics === 'function' && !window.runAnalytics.__wrapped) {
      var orig = window.runAnalytics;
      var wrapped = function(){
        if (!anticloneDetectado) {
          anticloneDetectado = true;
          track('anticlone_disparado_evento');
          try { sessionStorage.setItem('anticlone_at', String(Date.now())); } catch(e){}
        }
        return orig.apply(this, arguments);
      };
      wrapped.__wrapped = true;
      window.runAnalytics = wrapped;
      return true;
    }
    return false;
  }
  tentarInterceptar();
  setTimeout(tentarInterceptar, 100);
  setTimeout(tentarInterceptar, 500);
  setTimeout(tentarInterceptar, 2000);

  // Marca saída
  function marcarSaida(){
    if (enviouSaida) return;
    enviouSaida = true;
    var tempo = Date.now() - pageLoadAt;
    var bucket;
    if (tempo < 3000) bucket = 'lt3s';
    else if (tempo < 10000) bucket = 'lt10s';
    else if (tempo < 30000) bucket = 'lt30s';
    else if (tempo < 60000) bucket = 'lt60s';
    else bucket = 'gte60s';
    track('saida_evento_' + bucket);
    if (!interagiu) {
      track('saida_evento_sem_interacao');
      if (tempo < 5000) track('saida_evento_suspeita');
    }
    if (anticloneDetectado) track('saida_evento_via_anticlone');
  }

  window.addEventListener('pagehide', marcarSaida);
  document.addEventListener('visibilitychange', function(){
    if (document.hidden) marcarSaida();
  });
})();
</script>
</body>
